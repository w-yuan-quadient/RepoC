name: Build Solution2 C

on:
  push:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      run_full_pipeline:
        description: Run full pipeline after Echo Success
        required: true
        default: "false"
        type: choice
        options:
          - "true"
          - "false"
  workflow_run:
    workflows: ["Build Solution1 A+B"]
    types: [completed]

jobs:
  build_c:
    if: ${{ github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success' }}

    runs-on: windows-2022

    steps:
      - name: Checkout RepoC
        uses: actions/checkout@v4

      - name: Echo Success
        shell: pwsh
        run: |
          Write-Host "Successfully triggered by RepoA workflow run completion."

      - name: List latest successful producer runs
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.REPO_ACCESS_TOKEN }}
        run: |
          gh run list --repo w-yuan-quadient/RepoA --workflow "Build Solution1 A+B" --branch main --status success --limit 5

      - name: Resolve latest successful run ID
        id: resolve_run
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.REPO_ACCESS_TOKEN }}
        run: |
          $runId = gh run list --repo w-yuan-quadient/RepoA --workflow "Build Solution1 A+B" --branch main --status success --limit 1 --json databaseId --jq '.[0].databaseId'
          if ([string]::IsNullOrWhiteSpace($runId)) {
            throw "No successful run found in RepoA for workflow 'Build Solution1 A+B' on branch main."
          }
          "run_id=$runId" >> $env:GITHUB_OUTPUT
          Write-Host "Resolved run id: $runId"

      - name: Download producer artifact
        if: ${{ github.event_name != 'workflow_dispatch' && inputs.run_full_pipeline == 'true' }}
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.REPO_ACCESS_TOKEN }}
        run: |
          gh run download ${{ steps.resolve_run.outputs.run_id }} --repo YOUR_ORG/RepoA --name vector-libs-x64-release --dir deps

      - name: Inspect downloaded artifact tree
        if: ${{ github.event_name != 'workflow_dispatch' && inputs.run_full_pipeline == 'true' }}
        shell: pwsh
        run: |
          Get-ChildItem -Recurse deps

      - name: Copy dependent DLLs beside exe
        if: ${{ github.event_name != 'workflow_dispatch' && inputs.run_full_pipeline == 'true' }}
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force bin\x64\Release | Out-Null
          Copy-Item deps\VectorAdd\bin\VectorAdd.dll bin\x64\Release\
          Copy-Item deps\VectorMul\bin\VectorMul.dll bin\x64\Release\

      - name: Setup MSBuild
        if: ${{ github.event_name != 'workflow_dispatch' && inputs.run_full_pipeline == 'true' }}
        uses: microsoft/setup-msbuild@v2

      - name: Build Solution2
        if: ${{ github.event_name != 'workflow_dispatch' && inputs.run_full_pipeline == 'true' }}
        shell: pwsh
        run: |
          msbuild Solution2_C.sln /m /p:Configuration=Release /p:Platform=x64

      - name: Run demo exe
        if: ${{ github.event_name != 'workflow_dispatch' && inputs.run_full_pipeline == 'true' }}
        shell: pwsh
        run: |
          .\bin\x64\Release\VectorDemoApp.exe

      - name: Upload final exe package
        if: ${{ github.event_name != 'workflow_dispatch' && inputs.run_full_pipeline == 'true' }}
        uses: actions/upload-artifact@v4
        with:
          name: vector-demo-app-x64-release
          path: |
            bin/x64/Release/VectorDemoApp.exe
            bin/x64/Release/VectorAdd.dll
            bin/x64/Release/VectorMul.dll
